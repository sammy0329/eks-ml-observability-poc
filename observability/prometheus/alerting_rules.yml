groups:
  - name: inference-api.rules
    rules:

      # S2 시나리오: 에러율 1% 초과 5분 지속
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(request_count_total{status=~"4..|5.."}[5m]))
            /
            sum(rate(request_count_total[5m]))
          ) > 0.01
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes."

      # p95 응답시간 200ms 초과 5분 지속
      - alert: HighLatency
        expr: |
          histogram_quantile(0.95,
            sum(rate(request_latency_seconds_bucket{endpoint="/predict"}[5m])) by (le)
          ) > 0.2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High p95 latency detected"
          description: "p95 latency is {{ $value | humanizeDuration }} on /predict."

      # S3 시나리오: 입력 결측률 30% 초과 5분 지속
      - alert: HighMissingRate
        expr: |
          avg(input_missing_rate) > 0.3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High input missing rate detected"
          description: "Average input missing rate is {{ $value | humanizePercentage }}."
