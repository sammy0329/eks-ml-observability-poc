groups:
  - name: inference-api.rules
    rules:

      # S2 시나리오: 에러율 1% 초과 5분 지속
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(request_count_total{status=~"4..|5.."}[5m]))
            /
            sum(rate(request_count_total[5m]))
          ) > 0.01
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes."

      # S1 시나리오: 요청 수 15 RPS 초과 1분 지속
      # (로컬 리허설용 — EKS 배포 시 HighLatency p95>200ms 로 교체 권장)
      - alert: HighRequestRate
        expr: |
          sum(rate(request_count_total{endpoint="/predict"}[1m])) > 15
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High request rate detected"
          description: "Request rate is {{ $value | humanize }} req/s on /predict."

      # S3 시나리오: 입력 결측률 30% 초과 5분 지속
      - alert: HighMissingRate
        expr: |
          max(input_missing_rate) > 0.3
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High input missing rate detected"
          description: "Average input missing rate is {{ $value | humanizePercentage }}."
