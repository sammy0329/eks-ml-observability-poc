apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
data:
  init.sql: |
    -- EKS ML Observability PoC — 운영 이벤트 DB 스키마

    -- 서비스 배포 이력
    CREATE TABLE IF NOT EXISTS deployments (
        id           SERIAL PRIMARY KEY,
        service_name VARCHAR(100) NOT NULL,
        version      VARCHAR(50)  NOT NULL,
        deployed_at  TIMESTAMPTZ  NOT NULL DEFAULT NOW(),
        deployed_by  VARCHAR(100) NOT NULL DEFAULT 'system',
        status       VARCHAR(20)  NOT NULL DEFAULT 'deployed'
                     CHECK (status IN ('deployed', 'rolled_back')),
        notes        TEXT
    );

    -- 이상 감지 인시던트
    CREATE TABLE IF NOT EXISTS incidents (
        id            SERIAL PRIMARY KEY,
        sensor_id     VARCHAR(100) NOT NULL,
        detected_at   TIMESTAMPTZ  NOT NULL DEFAULT NOW(),
        reason        VARCHAR(50)  NOT NULL
                      CHECK (reason IN ('variance_spike', 'drift_detected', 'missing_rate_high')),
        anomaly_score FLOAT        NOT NULL,
        resolved_at   TIMESTAMPTZ,
        severity      VARCHAR(20)  NOT NULL DEFAULT 'warning'
                      CHECK (severity IN ('warning', 'critical'))
    );

    -- 데모 시나리오 실행 기록
    CREATE TABLE IF NOT EXISTS scenario_runs (
        id         SERIAL PRIMARY KEY,
        scenario   VARCHAR(10)  NOT NULL CHECK (scenario IN ('S1', 'S2', 'S3')),
        profile    VARCHAR(50)  NOT NULL,
        started_at TIMESTAMPTZ  NOT NULL DEFAULT NOW(),
        ended_at   TIMESTAMPTZ,
        notes      TEXT
    );
